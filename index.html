<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1c33" />
    <meta
      name="description"
      content="Arcade baseball in your browser — your index finger is the bat! Hand tracking powered by MediaPipe."
    />
    <title>Finger Baseball Arcade</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b1c33;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app canvas {
        display: block;
      }
      /* Hidden video element that feeds MediaPipe. Never shown directly;
         the in-game preview re-draws it onto a texture. */
      #webcam {
        position: absolute;
        top: 0;
        left: 0;
        width: 2px;
        height: 2px;
        opacity: 0;
        pointer-events: none;
      }
      #boot-loader {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-family: 'Arial Black', Arial, sans-serif;
        background: radial-gradient(circle at 50% 30%, #16375f, #0b1c33);
        transition: opacity 0.4s ease;
        z-index: 10;
      }
      #boot-loader .ball {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ffffff, #d8d8d8);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        animation: bounce 0.8s cubic-bezier(0.28, 0.84, 0.42, 1) infinite alternate;
      }
      @keyframes bounce {
        from {
          transform: translateY(-18px);
        }
        to {
          transform: translateY(10px) scale(1.05, 0.95);
        }
      }
      #boot-loader .title {
        font-size: 20px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <video id="webcam" autoplay playsinline muted></video>
    <div id="boot-loader">
      <div class="ball"></div>
      <div class="title">FINGER BASEBALL</div>
    </div>
    <script>
      // Boot watchdog that lives outside the game bundle. main.ts has its own
      // fallback once it runs, but if the bundle itself never loads (404 after
      // a bad deploy, blocked script, unsupported browser) nothing in it can
      // fire — so this inline script turns that silent, permanent bouncing
      // ball into a visible error with a reload button.
      (function () {
        function bootFailed(message) {
          var loader = document.getElementById('boot-loader');
          if (!loader || document.getElementById('boot-reload')) return;
          loader.innerHTML =
            '<div class="title">' + message + '</div>' +
            '<button id="boot-reload" style="margin-top:4px;padding:10px 22px;border-radius:8px;border:none;background:#ffe66d;color:#0b1c33;font:bold 14px \'Arial Black\', Arial, sans-serif;letter-spacing:1px;cursor:pointer;">RELOAD</button>';
          document.getElementById('boot-reload').addEventListener('click', function () {
            location.reload();
          });
        }
        // Resource errors don't bubble, but they can be captured on window.
        window.addEventListener(
          'error',
          function (event) {
            var target = event.target;
            if (target && target.tagName === 'SCRIPT') {
              bootFailed("COULDN'T LOAD THE GAME");
            }
          },
          true
        );
        // Belt and braces: the bundle sets window.__game synchronously when it
        // executes, so if it still isn't there well after load, it never ran.
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (!window.__game) bootFailed("COULDN'T START THE GAME");
          }, 12000);
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
